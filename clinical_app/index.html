<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <title>NeyroCog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0F766E">
  <meta name="application-name" content="NeyroCog">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NeyroCog">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <link rel="stylesheet" href="app.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- KNBT scoring engine (pure JS, no JSX) -->
  <script src="knbt.js"></script>
  <script src="prediction.js"></script>
  <script src="stats.js"></script>
</head>
<body>
  <script>
    // Apply saved theme early to avoid flash-of-light
    (function(){ try { var t = localStorage.getItem("ktt_theme"); if (t) document.documentElement.setAttribute("data-theme", t); } catch(e){} })();
  </script>
  <div id="root"></div>

  <!-- Shared atoms -->
  <script type="text/babel" src="_shared.jsx"></script>
  <script type="text/babel" src="tests/_TestShell.jsx"></script>
  <script type="text/babel" src="training/_TrainingShell.jsx"></script>
  <script src="training/_meta.js"></script>
  <script src="training/adaptive.js"></script>

  <!-- Top-level screens -->
  <script type="text/babel" src="Login.jsx"></script>
  <script type="text/babel" src="DoctorProfileModal.jsx"></script>
  <script type="text/babel" src="PatientsList.jsx"></script>
  <script type="text/babel" src="Composite.jsx"></script>
  <script type="text/babel" src="PNBForecast.jsx"></script>
  <script type="text/babel" src="Analytics.jsx"></script>
  <script type="text/babel" src="AnalyticsROC.jsx"></script>
  <script type="text/babel" src="AnalyticsTreatment.jsx"></script>
  <script type="text/babel" src="AnalyticsReports.jsx"></script>
  <script type="text/babel" src="training/RehabHub.jsx"></script>
  <script type="text/babel" src="PatientView.jsx"></script>

  <!-- Tests -->
  <script type="text/babel" src="TMT.jsx"></script>
  <script type="text/babel" src="tests/Stroop.jsx"></script>
  <script type="text/babel" src="tests/DST.jsx"></script>
  <script type="text/babel" src="tests/LMWT.jsx"></script>
  <script type="text/babel" src="tests/NS.jsx"></script>
  <script type="text/babel" src="tests/EEG.jsx"></script>
  <script type="text/babel" src="tests/Audio.jsx"></script>

  <!-- Cognitive rehabilitation training -->
  <script type="text/babel" src="training/engines_core.jsx"></script>
  <script type="text/babel" src="training/engines_extra.jsx"></script>
  <script type="text/babel" src="training/engines_unique.jsx"></script>
  <script type="text/babel" src="training/VisualSearch.jsx"></script>
  <script type="text/babel" src="training/NBack.jsx"></script>
  <script type="text/babel" src="training/TaskSwitch.jsx"></script>
  <script type="text/babel" src="training/ReactionTime.jsx"></script>
  <script type="text/babel" src="training/Tracking.jsx"></script>

  <!-- Results + App root -->
  <script type="text/babel" src="Results.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>

  <!-- PWA registration (Serwist) -->
  <script type="module" src="pwa.js"></script>

  <script type="text/babel">
    const REQUIRED = [
      "App", "Login", "PatientsList", "PatientView", "Composite", "Results",
      "AppHeader", "Logo", "Icon", "EmptyState", "CountUp", "DoctorProfileModal",
      "TestShell", "TestIntro", "TestMetric",
      "TMTTest", "StroopTest", "DSTTest", "LMWTTest", "NSTest", "EEGTest", "AudioTest",
      "TrainingShell", "TrainingIntro", "TrainingDone",
      "RehabHub", "PNBForecast",
      "Analytics", "ROCModule", "TreatmentModule", "ReportsModule",
      "EngSequence", "EngChoice", "EngMatch", "EngAudio", "EngBreathe",
      "EngSort", "EngSimon", "EngGrid",
      "VisualSearchTraining", "NBackTraining", "TaskSwitchTraining", "RTimeTraining", "TrackingTraining",
    ];
    const mount = () => {
      const missing = REQUIRED.filter(k => !window[k]);
      if (missing.length) {
        console.log("[mount] waiting for:", missing.join(", "));
        return setTimeout(mount, 50);
      }
      if (!window.KNBT || !window.PNBPredictor || !window.Stats) {
        console.log("[mount] waiting for engines…");
        return setTimeout(mount, 50);
      }
      try {
        ReactDOM.createRoot(document.getElementById("root"))
          .render(React.createElement(window.App));
      } catch (e) {
        console.error("[mount] render failed:", e);
        document.getElementById("root").innerHTML =
          '<pre style="padding:24px;color:#991B1B;font-family:monospace;white-space:pre-wrap">' +
          'Render error: ' + String(e) + '\n\n' + (e.stack || '') + '</pre>';
      }
    };
    mount();
  </script>
</body>
</html>
